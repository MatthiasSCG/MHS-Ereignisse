<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" />
  <title>Ereignisse</title>
  <style>
    :root {
      --primary:#2563eb;
      --ink:#111827;
      --muted:#6b7280;
      --bg:#f5f7fb;
      --card:#ffffff;
      --radius:12px;
      --shadow:0 8px 24px rgba(2,6,23,.08);
      --ctl-h:44px;
      --col-gap:8px;
    }

    *{ box-sizing:border-box; }

    body {
      margin:0;
      min-height:100dvh;
      background:var(--bg);
      color:var(--ink);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    .page{ padding:24px; }
    .container{ width:min(96vw, 1600px); margin:0 auto; }

    header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      color:var(--ink);
      margin-bottom:18px;
    }

    .brand{ display:flex; align-items:center; gap:14px; }

    .flag {
      width:28px;
      height:28px;
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%, rgba(37,99,235,.25), rgba(37,99,235,.65));
      box-shadow:var(--shadow);
    }

    h1{ margin:0; font-size:clamp(20px,3vw,28px); font-weight:700; letter-spacing:.25px; }
    .actions{ display:flex; gap:10px; flex-wrap:wrap; }

    .btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      height:var(--ctl-h);
      padding:0 12px;
      border-radius:10px;
      border:1px solid #cbd5e1;
      background:#fff;
      color:#0f172a;
      cursor:pointer;
      transition:background .15s, border-color .15s, box-shadow .15s;
    }
    .btn:hover{ background:#f8fafc; }
    .btn:focus{ outline:none; box-shadow:0 0 0 3px rgba(37,99,235,.18); }
    .btn-primary{ background:var(--primary); border-color:transparent; color:#fff; }
    .btn-primary:hover{ filter:brightness(.98); }
    .btn-ghost{ background:#f8fafc; color:#0b1220; border-color:#e5e7eb; }

    .card {
      background:var(--card);
      border:1px solid #e5e7eb;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      position:relative;
    }
    .stack{ display:flex; flex-direction:column; gap:12px; }
    .card + .card{ margin-top:24px; }

    /* Filter-Toolbar (kompakt, über der Tabelle) */
    .filter-toolbar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 16px;
      background:var(--card);
      border:1px solid #e5e7eb;
      border-radius:var(--radius);
      margin-bottom:16px;
    }
    .filter-toolbar .search{ max-width:280px; }
    @media (max-width:768px){
      .filter-toolbar{ flex-direction:column; align-items:stretch; }
      .filter-toolbar .toolbar{ justify-content:space-between; }
      .filter-toolbar .search{ max-width:100%; }
    }

    /* Tabellen-Card (Hauptfokus) */
    .card-table {
      box-shadow:0 8px 32px rgba(2,6,23,.10);
    }

    /* Eingabe-Card (dezenter, am Ende) */
    .card-input {
      background:var(--bg);
      box-shadow:none;
      border:1px dashed #d1d5db;
      margin-top:20px;
    }
    .input-header {
      font-size:14px;
      font-weight:600;
      color:var(--muted);
      margin-bottom:12px;
    }
    .input-grid {
      display:grid;
      gap:12px;
      align-items:end;
      grid-template-columns:140px 140px 140px 1fr auto;
    }
    .input-grid .stack-text{ min-width:0; }
    .input-grid .stack-buttons .toolbar{ flex-wrap:nowrap; }
    .input-grid .label-spacer{ display:block; height:18px; }
    @media (max-width:960px){
      .input-grid{ grid-template-columns:1fr 1fr 1fr; }
      .input-grid .stack-text{ grid-column:1 / -1; }
      .input-grid .stack-buttons{ grid-column:1 / -1; justify-self:end; }
    }
    @media (max-width:600px){
      .input-grid{ grid-template-columns:1fr; }
      .input-grid .stack-buttons{ justify-self:stretch; }
      .input-grid .stack-buttons .toolbar{ justify-content:stretch; }
      .input-grid .stack-buttons .btn{ flex:1; }
    }

    .grid{ display:grid; gap:12px; align-items:center; grid-template-columns:180px 180px 140px minmax(0,1fr) max-content; }
    @media (max-width:960px){ .grid{ grid-template-columns:1fr 1fr; } }
    @media (max-width:600px){ .grid{ grid-template-columns:1fr; } }

    label{ font-size:13px; color:#334155; }

    input[type="date"],input[type="text"] {
      width:100%;
      padding:0 12px;
      border-radius:10px;
      border:1px solid #d1d5db;
      background:#fff;
      font-size:14px;
      height:var(--ctl-h);
      line-height:calc(var(--ctl-h) - 2px);
      transition:border-color .15s, box-shadow .15s;
    }
    input[type="date"]:focus, input[type="text"]:focus {
      outline:none;
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(37,99,235,.15);
    }
    #date,#end{ width:100%; }
    #text{ width:100%; }

    .toolbar{ display:flex; gap:8px; align-items:center; }
    .toolbar-spread{ justify-content:space-between; }
    .toolbar-flex{ flex:1; min-width:0; }

    select {
      height:var(--ctl-h);
      border-radius:10px;
      border:1px solid #d1d5db;
      background:#fff;
      padding:0 10px;
      font-size:14px;
    }
    #sortKey{ width:180px; }
    #sortDirBtn.btn-icon{ width:32px; height:32px; }
    #themeBtn.btn-icon{ width:var(--ctl-h); height:var(--ctl-h); }

    .table-wrap {
      overflow:auto;
      border-radius:12px;
      border:1px solid #e5e7eb;
      background:#fff;
      padding-inline:16px;
    }
    table {
      border-collapse:separate;
      border-spacing:var(--col-gap) 0;
      margin:0;
      width:100%;
      min-width:0;
      background:#fff;
    }
    thead th {
      position:sticky;
      top:0;
      z-index:1;
      background:#fff;
      text-align:left;
      font-size:12px;
      letter-spacing:.02em;
      color:#475569;
      border-bottom:1px solid #e5e7eb;
      padding:10px 12px;
    }
    tbody td {
      padding:10px 12px;
      border-bottom:1px solid #eef2f7;
      vertical-align:top;
      background:#fff;
      border-radius:8px;
    }
    tbody tr:hover td{ background:#f8fafc; }

    .search{ flex:1 1 auto; width:100%; min-width:160px; }

    th.days{ text-align:left; }
    td.days{ text-align:right; }
    th.days,td.days{ width:var(--days-col-w, 140px); }
    th.actions,td.actions{ width:120px; }
    th.col-date{ width:130px; }
    td.actions{ white-space:nowrap; }

    .days-wrap{ display:inline-flex; flex-direction:column; align-items:flex-end; gap:4px; }
    .days-badge,.days-sub {
      display:inline-block;
      font-size:12px;
      color:#374151;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid #e5e7eb;
      background:#f9fafb;
      min-width:3ch;
      text-align:right;
      white-space:nowrap;
    }
    .days-range{ color:#1d4ed8; border-color:#c7d2fe; background:#eef2ff; }
    .days-milestone{ color:#065f46; border-color:#86efac; background:#ecfdf5; font-weight:600; }

    .badge{ font-size:12px; background:#eef2ff; color:#3730a3; padding:2px 8px; border-radius:999px; }

    /* Kategorie-Badges */
    .cat-badge {
      display:inline-flex;
      align-items:center;
      gap:4px;
      font-size:11px;
      padding:2px 8px;
      border-radius:999px;
      font-weight:500;
      white-space:nowrap;
    }
    .cat-badge::before {
      content:"";
      width:6px;
      height:6px;
      border-radius:50%;
      background:currentColor;
    }
    .cat-none{ color:#6b7280; background:#f3f4f6; }
    .cat-geburtstag{ color:#be185d; background:#fce7f3; }
    .cat-todestag{ color:#1f2937; background:#e5e7eb; }
    .cat-jahrestag{ color:#dc2626; background:#fee2e2; }
    .cat-jubilaeum{ color:#7c3aed; background:#ede9fe; }
    .cat-projekt{ color:#0369a1; background:#e0f2fe; }
    .cat-termin{ color:#b45309; background:#fef3c7; }
    .cat-erinnerung{ color:#047857; background:#d1fae5; }
    .cat-sonstiges{ color:#475569; background:#f1f5f9; }

    /* Kategorie-Select Styling */
    #category, #filterCategory { width:140px; }
    th.col-cat{ width:120px; }

    .btn-icon {
      width:24px;
      height:24px;
      padding:0;
      border-radius:8px;
      border:1px solid #e5e7eb;
      background:#fff;
      color:#0b1220;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }
    .btn-icon:hover:not(:disabled){ background:#f1f5f9; }
    .btn-icon.danger{ color:#991b1b; border-color:#fecaca; background:#fff1f2; }
    .btn-icon:disabled{ opacity:0.4; cursor:not-allowed; }
    .btn-icon svg{ width:12px; height:12px; pointer-events:none; }

    .actions-row{ display:flex; gap:8px; flex-wrap:nowrap; align-items:center; }
    .muted{ font-size:12px; color:var(--muted); }
    .text-center{ text-align:center; }
    .mt-6{ margin-top:6px; }

    /* === Dark mode ===================================================== */
    [data-theme="dark"]{
      --bg:#0b1220; --card:#0f172a; --ink:#e5e7eb; --muted:#94a3b8;
    }
    [data-theme="dark"] .card{ background:var(--card); border-color:#334155; box-shadow:none; }
    [data-theme="dark"] header{ color:var(--ink); }
    [data-theme="dark"] .btn{ border-color:#334155; background:#0f172a; color:#e5e7eb; }
    [data-theme="dark"] .btn:hover{ background:#111827; }
    [data-theme="dark"] .btn-ghost{ background:#0f172a; color:#e5e7eb; border-color:#334155; }
    [data-theme="dark"] .btn-icon{ border-color:#334155; background:#0f172a; color:#e5e7eb; }
    [data-theme="dark"] .btn-icon:hover:not(:disabled){ background:#111827; }
    [data-theme="dark"] .btn-icon:disabled{ opacity:0.4; }
    [data-theme="dark"] input[type="date"], [data-theme="dark"] input[type="text"]{ background:#0b1220; color:#e5e7eb; border-color:#334155; }
    [data-theme="dark"] input::placeholder{ color:#94a3b8; }
    /* Select (Dropdown) in Dark mode */
    [data-theme="dark"] select{ background:#0b1220; color:#e5e7eb; border-color:#334155; }
    [data-theme="dark"] select:focus{ outline:none; border-color:#60a5fa; box-shadow:0 0 0 3px rgba(37,99,235,.25); }
    [data-theme="dark"] select option{ background:#0f172a; color:#e5e7eb; }
    [data-theme="dark"] .table-wrap{ background:#0f172a; border-color:#334155; }
    [data-theme="dark"] table{ background:#0f172a; }
    [data-theme="dark"] thead th{ background:#0f172a; color:#cbd5e1; border-bottom-color:#334155; }
    [data-theme="dark"] tbody td{ background:#0f172a; border-bottom-color:#1f2937; }
    [data-theme="dark"] tbody tr:hover td{ background:#111827; }
    [data-theme="dark"] .badge{ background:#1f2937; color:#cbd5e1; }
    [data-theme="dark"] .days-badge, [data-theme="dark"] .days-sub{ color:#cbd5e1; border-color:#334155; background:#111827; }
    [data-theme="dark"] .days-range{ color:#93c5fd; border-color:#1e3a8a; background:#0b1733; }
    [data-theme="dark"] .days-milestone{ color:#10b981; border-color:#065f46; background:#062d22; }
    /* Kategorie-Badges Dark Mode */
    [data-theme="dark"] .cat-none{ color:#9ca3af; background:#1f2937; }
    [data-theme="dark"] .cat-geburtstag{ color:#f472b6; background:#4c1d4c; }
    [data-theme="dark"] .cat-todestag{ color:#d1d5db; background:#374151; }
    [data-theme="dark"] .cat-jahrestag{ color:#f87171; background:#7f1d1d; }
    [data-theme="dark"] .cat-jubilaeum{ color:#a78bfa; background:#3b2d6b; }
    [data-theme="dark"] .cat-projekt{ color:#38bdf8; background:#0c3d5a; }
    [data-theme="dark"] .cat-termin{ color:#fbbf24; background:#4a3412; }
    [data-theme="dark"] .cat-erinnerung{ color:#34d399; background:#0a3d2e; }
    [data-theme="dark"] .cat-sonstiges{ color:#94a3b8; background:#1e293b; }
    /* Filter-Toolbar Dark Mode */
    [data-theme="dark"] .filter-toolbar{ background:#0f172a; border-color:#334155; }
    /* Eingabe-Card Dark Mode */
    [data-theme="dark"] .card-input{ background:#0b1220; border-color:#334155; }
    [data-theme="dark"] .input-header{ color:#94a3b8; }
    /* Tabellen-Card Dark Mode */
    [data-theme="dark"] .card-table{ box-shadow:none; }
  </style>
</head>
<body>
  <div class="page">
    <div class="container">
      <header>
        <div class="brand">
          <div class="flag" aria-hidden="true"></div>
          <div><h1>Ereignisse und deren Zeitraum zu heute</h1></div>
        </div>
        <div class="actions">
          <button id="openBtn" class="btn" title="Datei öffnen">Datei öffnen</button>
          <button id="saveBtn" class="btn" title="Speichern">Speichern</button>
          <button id="saveAsBtn" class="btn btn-primary" title="Speichern unter…">Speichern unter…</button>
          <button id="themeBtn" class="btn-icon" title="Dark Mode umschalten" aria-label="Dark Mode">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.64 13a1 1 0 00-1.05-1.36 7 7 0 01-8.23-8.23A1 1 0 0011 2.36 9 9 0 1021.64 13z"/></svg>
          </button>
        </div>
      </header>

      <!-- Filter-Toolbar -->
      <section class="filter-toolbar">
        <div class="toolbar toolbar-flex">
          <input id="search" class="search" type="text" placeholder="Filtern..." />
          <select id="filterCategory" title="Nach Kategorie filtern">
            <option value="">Alle Kategorien</option>
            <option value="geburtstag">Geburtstag</option>
            <option value="todestag">Todestag</option>
            <option value="jahrestag">Jahrestag</option>
            <option value="jubilaeum">Jubiläum</option>
            <option value="projekt">Projekt</option>
            <option value="termin">Termin</option>
            <option value="erinnerung">Erinnerung</option>
            <option value="sonstiges">Sonstiges</option>
            <option value="none">Ohne Kategorie</option>
          </select>
        </div>
        <div class="toolbar">
          <select id="sortKey" title="Sortieren nach">
            <option value="date" selected>Zeitpunkt</option>
            <option value="end">Endzeitpunkt</option>
            <option value="text">Ereignis</option>
            <option value="category">Kategorie</option>
          </select>
          <button id="sortDirBtn" class="btn-icon" title="Sortierrichtung umschalten" aria-label="Sortierrichtung">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 16l-6-6h12z"/></svg>
          </button>
        </div>
      </section>

      <!-- Tabelle (Hauptbereich) -->
      <section class="card card-table stack">
        <div class="table-wrap">
          <table id="table" aria-describedby="tableHint">
            <thead>
              <tr>
                <th class="col-date">Zeitpunkt</th>
                <th class="col-date">Endzeitpunkt</th>
                <th class="col-cat">Kategorie</th>
                <th>Ereignis</th>
                <th class="days">Differenz zu heute oder Endzeitpunkt</th>
                <th class="actions">Aktionen</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div id="tableHint" class="muted">Tipp: Doppelklick auf eine Zeile zum Bearbeiten.</div>
      </section>

      <!-- Eingabebereich (am Ende, dezenter) -->
      <section class="card card-input">
        <div class="input-header">Neues Ereignis</div>
        <div class="input-grid">
          <div class="stack">
            <label for="date">Zeitpunkt</label>
            <input id="date" type="date" />
          </div>
          <div class="stack">
            <label for="end">Endzeitpunkt</label>
            <input id="end" type="date" />
          </div>
          <div class="stack">
            <label for="category">Kategorie</label>
            <select id="category">
              <option value="">Keine</option>
              <option value="geburtstag">Geburtstag</option>
              <option value="todestag">Todestag</option>
              <option value="jahrestag">Jahrestag</option>
              <option value="jubilaeum">Jubiläum</option>
              <option value="projekt">Projekt</option>
              <option value="termin">Termin</option>
              <option value="erinnerung">Erinnerung</option>
              <option value="sonstiges">Sonstiges</option>
            </select>
          </div>
          <div class="stack stack-text">
            <label for="text">Ereignis</label>
            <input id="text" type="text" placeholder="Beschreibe das Ereignis…" />
          </div>
          <div class="stack stack-buttons">
            <label class="label-spacer">&nbsp;</label>
            <div class="toolbar">
              <button id="addBtn" class="btn btn-primary">Hinzufügen</button>
              <button id="clearBtn" class="btn btn-ghost">Zurücksetzen</button>
            </div>
          </div>
        </div>
        <div class="muted text-center mt-6">konzeptioniert von Matthias</div>
      </section>

    </div>
  </div>

  <input id="fileInput" type="file" accept=".json,application/json" style="display:none" />

  <script>
  'use strict';
  (function(){
    /** @typedef {{id:string, date:string, end:string, text:string, category:string, createdAt:string, updatedAt:string}} Entry */
    const $ = (s,el=document)=>el.querySelector(s);
    const $$ = (s,el=document)=>Array.from(el.querySelectorAll(s));

    const LS_KEY = 'zeiten-eintraege-v2';

    // Kategorie-Definitionen
    const CATEGORIES = {
      '': { label: 'Keine', css: 'cat-none' },
      'geburtstag': { label: 'Geburtstag', css: 'cat-geburtstag' },
      'todestag': { label: 'Todestag', css: 'cat-todestag' },
      'jahrestag': { label: 'Jahrestag', css: 'cat-jahrestag' },
      'jubilaeum': { label: 'Jubiläum', css: 'cat-jubilaeum' },
      'projekt': { label: 'Projekt', css: 'cat-projekt' },
      'termin': { label: 'Termin', css: 'cat-termin' },
      'erinnerung': { label: 'Erinnerung', css: 'cat-erinnerung' },
      'sonstiges': { label: 'Sonstiges', css: 'cat-sonstiges' }
    };

    const getCategoryLabel = (cat) => CATEGORIES[cat]?.label || 'Keine';
    const getCategoryCss = (cat) => CATEGORIES[cat]?.css || 'cat-none';
    const buildCategoryBadge = (cat) => {
      const css = getCategoryCss(cat);
      const label = getCategoryLabel(cat);
      return `<span class="cat-badge ${css}">${label}</span>`;
    };
    const buildCategorySelect = (selectedCat, id='') => {
      const idAttr = id ? `id="${id}"` : '';
      const options = Object.entries(CATEGORIES).map(([key, val]) => {
        const selected = key === selectedCat ? 'selected' : '';
        return `<option value="${key}" ${selected}>${val.label}</option>`;
      }).join('');
      return `<select ${idAttr} style="width:100%">${options}</select>`;
    };
    /** @type {Entry[]} */ let entries = [];
    let fileHandle = null; // FileSystemFileHandle | null
    let editingId = null;  // ID des aktuell bearbeiteten Eintrags

    // ---------- Edit-Mode Helpers ----------
    const disableOtherActions = () => {
      tbody.querySelectorAll('tr').forEach(tr => {
        if (tr.dataset.id !== editingId) {
          tr.querySelectorAll('.btn-icon[data-action]').forEach(btn => {
            btn.disabled = true;
          });
        }
      });
    };
    const enableAllActions = () => {
      editingId = null;
      tbody.querySelectorAll('.btn-icon[data-action]').forEach(btn => {
        btn.disabled = false;
      });
    };

    // ---------- Helpers ----------
    // File System Access API detection (Chrome, Edge, Opera on secure context)
    const supportsFS = (() => {
      if (!window.isSecureContext) return false;
      if (typeof window.showOpenFilePicker !== 'function') return false;
      if (typeof window.showSaveFilePicker !== 'function') return false;
      // Additional check for Edge compatibility
      const ua = navigator.userAgent;
      const isChromium = !!window.chrome || ua.includes('Chromium');
      const isEdge = ua.includes('Edg/');
      const isChrome = ua.includes('Chrome/') && !isEdge;
      // Both Chrome and Edge (Chromium-based) support File System Access API
      return isChromium || isEdge || isChrome;
    })();
    const todayISO = () => { const d=new Date(); const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const da=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${da}`; };
    const nowISOTimestamp = () => new Date().toISOString();
    const uid = () => `${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`;

    const saveToLocalStorage = () => { try{ localStorage.setItem(LS_KEY, JSON.stringify(entries)); }catch(e){} };
    const loadFromLocalStorage = () => {
      try {
        // Versuche zuerst neue Version zu laden
        let raw = localStorage.getItem(LS_KEY);
        if (raw) {
          entries = JSON.parse(raw);
        } else {
          // Fallback: alte Version migrieren
          raw = localStorage.getItem('zeiten-eintraege-v1');
          if (raw) {
            entries = JSON.parse(raw);
            // Migration: Kategorie-Feld hinzufügen
            entries = entries.map(e => ({ ...e, category: e.category || '' }));
            saveToLocalStorage();
          }
        }
        // Sicherstellen, dass alle Einträge ein category-Feld haben
        entries = entries.map(e => ({ ...e, category: e.category || '' }));
      } catch(e) {
        entries = [];
      }
    };

    const sanitizeText = (s='') => String(s).replace(/\r?\n/g,' ').replace(/\t/g,' ').trim();

      } catch (err) {
        // Ensure writable is closed even on error to prevent file locks
        if (writable) {
          try { await writable.abort(); } catch (_) {}
        }
        throw err;
      }
    }

    // Verify file handle permissions (required for Edge in some scenarios)
    async function verifyPermission(handle, mode = 'readwrite') {
      const options = { mode };
      if ((await handle.queryPermission(options)) === 'granted') return true;
      if ((await handle.requestPermission(options)) === 'granted') return true;
      return false;
    }
    async function saveFile(){
      try {
        if (supportsFS) {
          try {
            if (fileHandle && fileHandle.createWritable) {
              // Verify permission before writing (important for Edge)
              const hasPermission = await verifyPermission(fileHandle, 'readwrite');
              if (!hasPermission) {
                console.warn('Permission denied, falling back');
                fallbackSave();
                return;
              }
              await writeHandle(fileHandle, serializeJSON());
              updateFileInfo('Gespeichert');
            } else {
              await saveFileAs();
            }
          } catch (err) {
            if (err && err.name === 'AbortError') return;
            if (err && err.name === 'NotAllowedError') {
              console.warn('Permission not allowed, falling back');
              fallbackSave();
              return;
            }
            console.warn('FS save failed, falling back', err);
            fallbackSave();
          }
        } else {
          fallbackSave();
        }
      } catch (e) {
        alert('Konnte nicht speichern: ' + (e && e.message ? e.message : e));
      }
    }
    async function saveFileAs(){
      try {
        if (supportsFS) {
          try {
            // Reset Handle so the picker does not reuse an old filename
            fileHandle = null;
            const handle = await window.showSaveFilePicker({
              suggestedName: 'Ereignisse_Daten.json',
              types: [{
                description: 'JSON-Dateien',
                accept: { 'application/json': ['.json'] }
              }],
              excludeAcceptAllOption: false
            });
            // Verify write permission (important for Edge)
            const hasPermission = await verifyPermission(handle, 'readwrite');
            if (!hasPermission) {
              console.warn('Write permission denied, falling back');
              fallbackSaveAs();
              return;
            }
            fileHandle = handle;
            await writeHandle(fileHandle, serializeJSON());
            updateFileInfo('Gespeichert');
          } catch (err) {
            if (err && err.name === 'AbortError') return;
            if (err && err.name === 'NotAllowedError') {
              console.warn('Permission not allowed, falling back');
              fallbackSaveAs();
              return;
            }
            console.warn('FS save-as failed, falling back', err);
            fallbackSaveAs();
          }
        } else {
          fallbackSaveAs();
        }
      } catch (e) {
        alert('Konnte nicht "Speichern unter" ausführen: ' + (e && e.message ? e.message : e));
      }
    }

    // ---------- Events & Init ----------
    document.getElementById('addBtn').addEventListener('click', addEntry);
    document.getElementById('clearBtn').addEventListener('click', ()=>{ dateEl.value=''; endEl.value=''; categoryEl.value=''; textEl.value=''; dateEl.focus(); });
    document.getElementById('openBtn').addEventListener('click', openFile);
    document.getElementById('saveBtn').addEventListener('click', saveFile);
    document.getElementById('saveAsBtn').addEventListener('click', saveFileAs);

    // Sorting controls
    function updateSortIcon(){
      sortDirBtn.innerHTML = (sortDir === 'asc')
        ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8l6 6H6z"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 16l-6-6h12z"/></svg>';
      sortDirBtn.title = 'Sortierung: ' + (sortDir==='asc'?'aufsteigend':'absteigend');
    }
    sortKeyEl.addEventListener('change', ()=>{ sortKey = sortKeyEl.value; render(); });
    sortDirBtn.addEventListener('click', ()=>{ sortDir = (sortDir==='asc'?'desc':'asc'); updateSortIcon();
    render(); });

    // Theme controls
    function updateThemeIcon(){
      themeBtn.innerHTML = (theme==='dark')
        ? '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/></svg>';
      themeBtn.title = (theme==='dark') ? 'Helles Design' : 'Dunkles Design';
    }
    function applyTheme(){ document.documentElement.setAttribute('data-theme', theme); updateThemeIcon(); }
    themeBtn.addEventListener('click', ()=>{ theme = (theme==='dark' ? 'light' : 'dark'); localStorage.setItem(THEME_KEY, theme); applyTheme(); });
    (function(){
      const mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
      if(mq && typeof mq.addEventListener === 'function'){
        mq.addEventListener('change', e=>{ if(!localStorage.getItem(THEME_KEY)){ theme = e.matches ? 'dark' : 'light'; applyTheme(); } });
      }
    })();

    textEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter' && (e.metaKey||e.ctrlKey)) addEntry(); });
    searchEl.addEventListener('input', render);
    filterCategoryEl.addEventListener('change', render);

    dateEl.value = todayISO();
    loadFromLocalStorage();
    applyTheme();
    updateSortIcon();
    render();

    document.addEventListener('keydown', (e)=>{
      const k = e.key.toLowerCase();
      if ((e.ctrlKey||e.metaKey) && k==='s' && !e.shiftKey) { e.preventDefault(); saveFile(); }
      if ((e.ctrlKey||e.metaKey) && e.shiftKey && k==='s') { e.preventDefault(); saveFileAs(); }
      if ((e.ctrlKey||e.metaKey) && k==='o') { e.preventDefault(); openFile(); }
    });
  })();
  </script>
</body>
</html>
